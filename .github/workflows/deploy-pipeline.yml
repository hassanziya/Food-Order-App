# =============================================================================
# Test CI/CD Pipeline — Multiple Jobs for PureAgile Testing
# =============================================================================

name: Deploy Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  lint_and_format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  run_tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint_and_format
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

  build_app:
    name: Build Application
    runs-on: ubuntu-latest
    needs: run_tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy_preview:
    name: Deploy Preview Environment
    runs-on: ubuntu-latest
    needs: build_app
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to preview
        run: echo "Deploying preview for PR #${{ github.event.number }}..."

      - name: Post preview URL
        run: echo "Preview deployed ✅"

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build_app
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: echo "Deploying to staging..."

      - name: Run smoke tests
        run: echo "Running smoke tests on staging ✅"

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build_app
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: echo "Deploying to production..."

      - name: Notify team
        run: echo "Production deployment complete ✅"
